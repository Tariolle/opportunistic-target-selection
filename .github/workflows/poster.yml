name: Poster PDF

on:
  pull_request:
    paths:
      - ".github/workflows/poster.yml"
      - "poster/**"
      - "results/figures/standard/fig_headline_bars.pdf"
      - "results/figures/standard/fig_lockin.pdf"
      - "results/figures_theta/fig_theta.pdf"
  push:
    paths:
      - ".github/workflows/poster.yml"
      - "poster/**"
      - "results/figures/standard/fig_headline_bars.pdf"
      - "results/figures/standard/fig_lockin.pdf"
      - "results/figures_theta/fig_theta.pdf"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build poster
        uses: xu-cheng/latex-action@v3
        env:
          SOURCE_DATE_EPOCH: "0"
          FORCE_SOURCE_DATE: "1"
        with:
          working_directory: poster
          root_file: poster_beamer.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Verify committed PDF was updated with poster sources
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            echo "Skipping committed-PDF update check for initial branch push."
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head")"
          poster_sources='^(poster/(poster_beamer\.tex|school_logo\.png|logo_LITIS_cropped\.png|arxiv_qr\.png)|results/figures/standard/(fig_headline_bars|fig_lockin)\.pdf|results/figures_theta/fig_theta\.pdf)$'

          if grep -Eq "$poster_sources" <<< "$changed_files" &&
             ! grep -Fxq "poster/poster_beamer.pdf" <<< "$changed_files"; then
            echo "poster/poster_beamer.pdf was not updated with changed poster sources."
            echo "Run 'make -C poster' and commit the regenerated PDF."
            exit 1
          fi
